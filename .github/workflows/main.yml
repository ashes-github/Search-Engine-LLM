name: Sync to Hugging Face hub
on:
  push:
    branches: [release]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://ashes-hug:$HF_TOKEN@huggingface.co/spaces/ashes-hug/Search_Engine_llm main:main
